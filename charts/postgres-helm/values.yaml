nameOverride: ""
fullnameOverride: ""

commonAnnotations: {}

global:
  imageRegistry: ""
  imagePullSecrets: []

image:
  registry: ""
  repository: postgres
  tag: 16.6-alpine
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 1
revisionHistoryLimit: 10
updateStrategy:
  type: RollingUpdate

serviceAccount:
  create: false
  name: ""
  annotations: {}

automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  enabled: true
  fsGroup: 999
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

priorityClassName: ""
terminationGracePeriodSeconds: 30

service:
  enabled: true
  type: ClusterIP
  annotations: {}
  labels: {}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP

containerPorts:
  - name: postgres
    containerPort: 5432
    protocol: TCP

command: []
args: []
lifecycle: {}

env: []
envFrom: []
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""

configMounts: []
extraVolumeMounts: []
extraVolumes: []
initContainers: []
extraContainers: []

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

postgres:
  database: postgres
  username: postgres
  password: postgres
  pgdata: /var/lib/postgresql/data/pgdata

auth:
  existingSecret: ""
  passwordKey: password

probes:
  readiness:
    enabled: true
    execCommand:
      - pg_isready
      - -U
      - postgres
      - -d
      - postgres
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    enabled: true
    execCommand:
      - pg_isready
      - -U
      - postgres
      - -d
      - postgres
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6

persistence:
  enabled: true
  size: 8Gi
  accessModes:
    - ReadWriteOnce
  volumeClaimTemplateName: data
  mountPath: /var/lib/postgresql/data
  storageClassName: ""
  annotations: {}

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: ""
    scrapeTimeout: ""
    honorLabels: false
    labels: {}
    annotations: {}
    relabelings: []
    metricRelabelings: []
    endpoints:
      - port: postgres
        path: /metrics
        interval: ""
        scrapeTimeout: ""
